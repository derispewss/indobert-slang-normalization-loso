name: nlp-sentiment
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # Deep Learning (GPU - CUDA 12.x compatible)
  - pytorch::pytorch>=2.3.0
  - pytorch::torchvision
  - pytorch::pytorch-cuda=12.1

  # Data Science
  - conda-forge::pandas>=2.2.0
  - conda-forge::numpy>=1.26.4
  - conda-forge::scikit-learn>=1.4.0
  - conda-forge::joblib>=1.3.2
  - conda-forge::matplotlib>=3.8.3
  - conda-forge::seaborn>=0.13.2

  # Jupyter
  - conda-forge::jupyterlab>=4.0.0
  - conda-forge::ipykernel

  # Pip packages (tidak tersedia di conda)
  - pip:
    # Scraping Tokopedia (GraphQL)
    - requests>=2.31.0

    # Scraping Shopee (Browser bypass)
    - undetected-chromedriver>=3.5.5
    - selenium>=4.18.1

    # NLP
    - transformers>=4.40.0
    - datasets>=2.18.0
    - pysastrawi>=1.0.0
    - nltk>=3.8.1
    - wordcloud>=1.9.3

    # Deployment
    - fastapi>=0.110.0
    - uvicorn[standard]>=0.27.1
    - streamlit>=1.31.0
    - pydantic>=2.6.0

    # Utilities
    - tqdm>=4.66.2
    - loguru>=0.7.2
    - python-dotenv>=1.0.1
